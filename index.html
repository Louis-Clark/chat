<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Real-time chat application with video, media support, reactions, and voice calls">
    <title>Real-time Chat - Video, Media & Voice Calls</title>
    <link rel="stylesheet" href="style.css">
    <!-- YouTube IFrame API for video embeds -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Firebase SDK (Database only) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Cloudinary configuration
        window.CLOUDINARY_CLOUD_NAME = 'diaz0pbbc';
        window.CLOUDINARY_UPLOAD_PRESET = 'chat_app';

        const firebaseConfig = {
            apiKey: "AIzaSyCprAoKDodLuhCkv7j7HWWIGCfceC88Kls",
            authDomain: "chat-8f390.firebaseapp.com",
            databaseURL: "https://chat-8f390-default-rtdb.firebaseio.com",
            projectId: "chat-8f390",
            storageBucket: "chat-8f390.firebasestorage.app",
            messagingSenderId: "419574515896",
            appId: "1:419574515896:web:5d48b44ad7653c6be14c4d"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            window.database = firebase.database();
            console.log('✅ Firebase Database initialized');
            window.firebaseReady = true;
        } catch (err) {
            console.error('❌ Firebase initialization error:', err);
            window.firebaseReady = false;
            // Show error to user if Firebase fails
            document.addEventListener('DOMContentLoaded', () => {
                const setupScreen = document.getElementById('setup-screen');
                if (setupScreen) {
                    const errorDiv = document.createElement('div');
                    errorDiv.style.cssText = 'background: rgba(255,68,68,0.2); color: #ff4444; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;';
                    errorDiv.innerHTML = '⚠️ Firebase connection error. Please refresh and try again.';
                    setupScreen.querySelector('.setup-card').insertBefore(errorDiv, setupScreen.querySelector('.form-group'));
                }
            });
        }
    </script>
    
    <style>
        /* Additional styles for voice call features */
        .call-controls {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .call-btn {
            padding: 8px 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .call-btn:hover {
            transform: scale(1.02);
            background: var(--accent-hover);
        }
        
        .online-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }
        
        /* Modal styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.2s ease;
        }
        
        .modal.hidden {
            display: none;
        }
        
        .modal-content {
            background: var(--bg-primary);
            border-radius: 24px;
            padding: 24px;
            width: 350px;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            margin: 0;
            color: var(--text-primary);
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }
        
        .close-modal:hover {
            color: var(--text-primary);
        }
        
        .call-icon {
            font-size: 64px;
            text-align: center;
            margin: 20px 0;
        }
        
        .call-status {
            text-align: center;
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .call-timer {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .call-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .call-action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .call-action-btn:hover {
            transform: scale(1.05);
        }
        
        .call-action-btn.mute {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .call-action-btn.speaker {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .call-action-btn.end {
            background: #ff4444;
            color: white;
        }
        
        .call-action-btn.accept {
            background: #4CAF50;
            color: white;
            width: auto;
            border-radius: 40px;
            padding: 10px 24px;
        }
        
        .call-action-btn.reject {
            background: #ff4444;
            color: white;
            width: auto;
            border-radius: 40px;
            padding: 10px 24px;
        }
        
        .incoming-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }
        
        .user-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s ease;
        }
        
        .user-list-item:hover {
            background: var(--bg-hover);
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .user-info-text {
            flex: 1;
            margin-left: 12px;
        }
        
        .user-name {
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .user-status {
            font-size: 12px;
            color: #4CAF50;
        }
        
        .call-user-btn {
            padding: 6px 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: 14px;
        }
        
        .call-user-btn:hover {
            transform: scale(1.02);
        }
        
        .user-list-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .ring-animation {
            animation: ring 0.5s ease infinite;
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script src="script.js"></script>
    <script type="text/babel" src="app.jsx"></script>
</body>
</html>
