<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCprAoKDodLuhCkv7j7HWWIGCfceC88Kls",
            authDomain: "chat-8f390.firebaseapp.com",
            databaseURL: "https://chat-8f390-default-rtdb.firebaseio.com",
            projectId: "chat-8f390",
            storageBucket: "chat-8f390.firebasestorage.app",
            messagingSenderId: "419574515896",
            appId: "1:419574515896:web:5d48b44ad7653c6be14c4d"
        };

        firebase.initializeApp(firebaseConfig);
        window.database = firebase.database();
        window.firebaseReady = true;
        console.log('✅ Firebase initialized successfully');
    </script>
    <!-- Emoji Picker is removed due to MIME type issues -->
    <!-- Using text-based emoji input instead -->
</head>
<body>
    <div class="app">
        <!-- Setup Screen -->
        <div id="setup-screen" class="setup-screen">
            <div class="setup-card">
                <h1>🎯 Chat Room</h1>
                <div class="form-group">
                    <input type="text" id="username-input" class="username-input" placeholder="Enter your username" maxlength="20">
                </div>
                <div class="color-selector">
                    <label>Choose your color:</label>
                    <div class="color-options">
                        <button class="color-btn" data-color="#FF6B6B" style="background-color: #FF6B6B;"></button>
                        <button class="color-btn" data-color="#4ECDC4" style="background-color: #4ECDC4;"></button>
                        <button class="color-btn" data-color="#45B7D1" style="background-color: #45B7D1;"></button>
                        <button class="color-btn" data-color="#FFA07A" style="background-color: #FFA07A;"></button>
                        <button class="color-btn" data-color="#98D8C8" style="background-color: #98D8C8;"></button>
                        <button class="color-btn selected" data-color="#6C5CE7" style="background-color: #6C5CE7;"></button>
                    </div>
                </div>
                <button id="enter-chat" class="btn btn-primary">Enter Chat</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="chat-screen hidden">
            <div class="chat-header">
                <div class="header-content">
                    <h1>💬 Chat</h1>
                    <div class="user-info">
                        <span id="current-user" class="username-display"></span>
                        <div class="online-indicator"></div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
                    <button id="clear-chat" class="btn-icon" title="Clear chat history">🗑️</button>
                    <button id="reset-session" class="btn-icon" title="Reset local session">🔄</button>
                </div>
            </div>

            <div class="online-users-container">
                <div id="online-users" class="online-users">
                    <span class="online-count">Online: 1</span>
                </div>
            </div>

            <div id="chat-messages" class="chat-messages"></div>

            <div id="typing-indicator" class="typing-indicator hidden">
                <span>Someone is typing</span>
                <div class="typing-dots">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-controls">
                    <button id="emoji-btn" class="btn-icon" title="Add emoji">😊</button>
                    <button id="media-btn" class="btn-icon" title="Add image/video/audio">🖼️🎬🎤</button>
                    <input type="file" id="media-input" class="hidden" accept="image/*,video/*,audio/*">
                </div>
                <input type="text" id="message-input" class="message-input" placeholder="Type a message...">
                <button id="send-button" class="btn btn-send">Send</button>
            </div>

            <emoji-picker id="emoji-picker" class="emoji-picker hidden"></emoji-picker>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
