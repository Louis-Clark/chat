<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Chat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        // Firebase configuration - REPLACE WITH YOUR OWN
        const firebaseConfig = {
              apiKey: "AIzaSyCprAoKDodLuhCkv7j7HWWIGCfceC88Kls",
            authDomain: "chat-8f390.firebaseapp.com",
            databaseURL: "https://chat-8f390-default-rtdb.firebaseio.com",
             projectId: "chat-8f390",
            storageBucket: "chat-8f390.firebasestorage.app",
            messagingSenderId: "419574515896",
            appId: "1:419574515896:web:5d48b44ad7653c6be14c4d"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.firebaseApp = app;
        window.database = database;
        window.ref = ref;
        window.push = push;
        window.onChildAdded = onChildAdded;
    </script>
</head>
<body>
    <div class="container">
        <h1>Real-time Chat</h1>
        <div id="chat-messages"></div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="Type your message...">
            <button id="send-button">Send</button>
        </div>
        <div class="username-container">
            <input type="text" id="username-input" placeholder="Enter your username">
            <button id="set-username">Set Username</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
